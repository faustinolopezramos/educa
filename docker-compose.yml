services:
  postgres:
    image: postgres:16-alpine
    container_name: educa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: educa
      POSTGRES_PASSWORD: educa
      POSTGRES_DB: educa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educa -d educa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
